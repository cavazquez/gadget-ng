name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Formateo ────────────────────────────────────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ── Ejemplos TOML (parseo vía gadget-ng config) ───────────────────────────────
  example-configs:
    name: Example TOML configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Instalar HDF5 (consistencia con crates que enlazan hdf5)
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release -p gadget-ng-cli
      - run: ./scripts/validate_example_configs.sh

  # ── Compatibilidad MSRV declarada en workspace (1.85) ──────────────────────
  msrv:
    name: MSRV (1.85)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.100.0
      - name: Instalar HDF5 (hdf5-metno-sys / gadget-ng-io)
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - run: cargo check --workspace

  # ── Linting ─────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Instalar HDF5 (hdf5-metno-sys / gadget-ng-io)
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  # ── Linting extendido (bloqueante) ─────────────────────────────────────────
  clippy-all-targets:
    name: Clippy all-targets (blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Instalar HDF5 (hdf5-metno-sys / gadget-ng-io)
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Documentación ───────────────────────────────────────────────────────────
  doc:
    name: Doc build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Instalar HDF5 (hdf5-metno-sys / gadget-ng-io)
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Instalar HDF5 (hdf5-metno-sys / gadget-ng-io)
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # ── Benchmarks (dry-run sin medir, solo verifica que compilan y no panic) ──
  bench-check:
    name: Benchmarks (compile + dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Instalar HDF5 (hdf5-metno-sys / gadget-ng-io)
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev
      - uses: Swatinem/rust-cache@v2
      - name: Compilar benchmarks
        run: cargo bench --workspace --no-run
      - name: Dry-run (1 iteración, sin medir)
        run: |
          cargo bench --workspace -- --test 2>&1 | tail -20

  # ── Feature matrix: compilación con combinaciones clave ──────────────────
  feature-matrix:
    name: Feature matrix
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - ""           # default
          - "full"       # todas las features no-externas
          - "simd"       # SIMD + rayon
          - "hdf5"       # HDF5 I/O
          - "mpi,hdf5"   # MPI + HDF5 combinados
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Instalar dependencias de sistema
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev libopenmpi-dev openmpi-bin
      - uses: Swatinem/rust-cache@v2
      - name: Compilar CLI con features
        run: |
          if [ -z "$FEATURES" ]; then
            cargo check -p gadget-ng-cli
          else
            cargo check -p gadget-ng-cli --features "$FEATURES"
          fi
        env:
          FEATURES: ${{ matrix.features }}
      - name: Test (solo si sin MPI)
        if: ${{ !contains(matrix.features, 'mpi') }}
        run: |
          if [ -z "$FEATURES" ]; then
            cargo test --workspace --no-run
          else
            cargo test --workspace --features "$FEATURES" --no-run
          fi
        env:
          FEATURES: ${{ matrix.features }}

  # ── Smoke MPI (serial, sin mpirun real) ─────────────────────────────────────
  test-parallel:
    name: Tests parallel (serial runtime)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p gadget-ng-parallel

  # ── Tests MPI multirank (mpirun 2 y 4 rangos) ────────────────────────────────
  mpi-multirank:
    name: Tests MPI multirank (2 y 4 rangos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Instalar OpenMPI
        run: sudo apt-get install -y libopenmpi-dev openmpi-bin
      - name: Compilar tests MPI (sin ejecutar)
        run: |
          cargo test -p gadget-ng-parallel --features mpi --no-run
          cargo test -p gadget-ng-physics --features mpi --no-run
      - name: Ejecutar tests seriales con feature mpi
        run: |
          cargo test -p gadget-ng-parallel --features mpi
          cargo test -p gadget-ng-physics --features mpi
      - name: Ejecutar tests con mpirun (2 rangos)
        run: |
          for TEST in sfc_hardening let_validation treepm_distributed v2_hierarchical_cosmo phase43_dt_treepm_parallel; do
            BIN=$(find target/debug/deps -name "${TEST}-*" -executable | head -1)
            if [ -n "$BIN" ]; then
              mpirun --oversubscribe -n 2 "$BIN" --test-threads=1
            fi
          done
      - name: Ejecutar tests con mpirun (4 rangos)
        run: |
          for TEST in sfc_hardening let_validation treepm_distributed v2_hierarchical_cosmo phase43_dt_treepm_parallel; do
            BIN=$(find target/debug/deps -name "${TEST}-*" -executable | head -1)
            if [ -n "$BIN" ]; then
              mpirun --oversubscribe -n 4 "$BIN" --test-threads=1
            fi
          done

  # ── Cobertura (tarpaulin, ~10 min) ──────────────────────────────────────
  coverage:
    name: Coverage (tarpaulin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Instalar HDF5 (hdf5-metno-sys / gadget-ng-io)
        run: sudo apt-get update && sudo apt-get install -y libhdf5-dev
      - uses: Swatinem/rust-cache@v2
      - name: Instalar tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin
      - name: Ejecutar cobertura
        run: cargo tarpaulin --workspace --out Xml --output-dir . --timeout 120
      - name: Subir a Codecov
        uses: codecov/codecov-action@v6
        with:
          files: cobertura.xml,tarpaulin-report.xml

  # ── Auditoría de seguridad (semanal) ──────────────────────────────────────
  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cargo install cargo-audit --locked
      - run: cargo audit --deny warnings

  # ── Licencias y dependencias no permitidas ────────────────────────────────
  deny:
    name: License & dependency check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cargo install cargo-deny --locked
      - run: cargo deny check licenses
      - run: cargo deny check bans

  # ── Linting de shell scripts ──────────────────────────────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './scripts'
          format: tty
          severity: warning
