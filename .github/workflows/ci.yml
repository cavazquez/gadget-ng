name: CI

on:
  push:
    branches: [main, master]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # ── Formateo ────────────────────────────────────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  # ── Linting ─────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace -- -D warnings

  # ── Tests ───────────────────────────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # ── Benchmarks (dry-run sin medir, solo verifica que compilan y no panic) ──
  bench-check:
    name: Benchmarks (compile + dry-run)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Compilar benchmarks
        run: cargo bench --workspace --no-run
      - name: Dry-run (1 iteración, sin medir)
        run: |
          cargo bench --workspace -- --test 2>&1 | tail -20

  # ── Smoke MPI (serial, sin mpirun real) ─────────────────────────────────────
  test-parallel:
    name: Tests parallel (serial runtime)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test -p gadget-ng-parallel

  # ── Tests MPI multirank (mpirun 2 y 4 rangos) ────────────────────────────────
  mpi-multirank:
    name: Tests MPI multirank (2 y 4 rangos)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Instalar OpenMPI
        run: sudo apt-get install -y libopenmpi-dev openmpi-bin
      - name: Compilar tests MPI (sin ejecutar)
        run: cargo test -p gadget-ng-parallel --features mpi --no-run
      - name: Ejecutar tests seriales con feature mpi
        run: cargo test -p gadget-ng-parallel --features mpi
      - name: Ejecutar tests con mpirun (2 rangos)
        run: |
          BIN=$(find target/debug/deps -name "sfc_hardening-*" -executable | head -1)
          if [ -n "$BIN" ]; then
            mpirun --oversubscribe -n 2 "$BIN" --test-threads=1
          fi
          BIN=$(find target/debug/deps -name "let_validation-*" -executable | head -1)
          if [ -n "$BIN" ]; then
            mpirun --oversubscribe -n 2 "$BIN" --test-threads=1
          fi
      - name: Ejecutar tests con mpirun (4 rangos)
        run: |
          BIN=$(find target/debug/deps -name "sfc_hardening-*" -executable | head -1)
          if [ -n "$BIN" ]; then
            mpirun --oversubscribe -n 4 "$BIN" --test-threads=1
          fi
          BIN=$(find target/debug/deps -name "let_validation-*" -executable | head -1)
          if [ -n "$BIN" ]; then
            mpirun --oversubscribe -n 4 "$BIN" --test-threads=1
          fi

  # ── Cobertura (opcional, requiere cargo-tarpaulin) ──────────────────────────
  coverage:
    name: Coverage (tarpaulin)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Instalar tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Ejecutar cobertura
        run: cargo tarpaulin --workspace --out Xml --timeout 120
      - name: Subir a Codecov
        uses: codecov/codecov-action@v4
        with:
          files: cobertura.xml
        continue-on-error: true
