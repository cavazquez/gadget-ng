name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: fmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: test
        run: cargo test

  mpi-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install OpenMPI
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libopenmpi-dev openmpi-bin python3
      - name: Build (MPI)
        run: cargo build --features mpi
      - name: MPI smoke (4 ranks)
        run: ./scripts/mpi/run_smoke.sh
      - name: Serial vs MPI parity
        run: ./scripts/validation/compare_serial_mpi.sh
