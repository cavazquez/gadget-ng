# cargo-deny configuration for gadget-ng
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "deny"
# Transitive unmaintained (sin fix upstream inmediato); mismo conjunto que CI `cargo audit`.
ignore = [
    "RUSTSEC-2024-0436", # paste ← hdf5-metno
    "RUSTSEC-2025-0141", # bincode 1.x
    "RUSTSEC-2025-0058", # custom_derive
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
    "Unlicense",
    "GPL-3.0",   # nuestro
]

[bans]
multiple-versions = "warn"
deny = []
skip = []
