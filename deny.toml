# cargo-deny configuration for gadget-ng
# Docs: https://embarkstudios.github.io/cargo-deny/

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "BSD-2-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    "BSL-1.0",
    "CC0-1.0",
    "MPL-2.0",
    "OpenSSL",
    "Unlicense",
    "GPL-3.0",   # nuestro
]
copyleft = "deny"
default = "deny"

[bans]
multiple-versions = "warn"
deny = []
skip = []
