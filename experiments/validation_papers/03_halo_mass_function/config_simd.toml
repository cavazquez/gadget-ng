# ─────────────────────────────────────────────────────────────────────────────
# Experimento 03 — Halo Mass Function (ΛCDM, N=128³, box=100 Mpc/h)
#
# Evolución desde z≈49 (a=0.02) hasta z=0 (a=1.0).
# FoF b=0.2, min_particles=20  →  l_link ≈ 0.16 Mpc/h.
# Con l̄ ≈ 0.78 Mpc/h la evolución no-lineal necesita que las sobredensidades
# internas tengan separaciones < l_link. Para eso hay que llegar a z=0.
# ─────────────────────────────────────────────────────────────────────────────

[simulation]
particle_count = 2097152          # 128³
box_size       = 100.0            # Mpc/h
dt             = 0.005            # paso inicial pequeño — el criterio adaptativo lo ajusta
num_steps      = 600              # suficientes para que a(t) llegue a 1.0 desde 0.02
softening      = 0.03             # Mpc/h ≈ l̄/25 (spacing ~0.78 Mpc/h)
physical_softening = true
seed           = 42
integrator     = "leapfrog"

[initial_conditions]
kind = { zeldovich = { seed = 42, grid_size = 128, spectral_index = 0.9649, transfer = "eisenstein_hu", sigma8 = 0.8111, omega_b = 0.0490, h = 0.6736, t_cmb = 2.7255, box_size_mpc_h = 100.0, use_2lpt = true, normalization_mode = "z0_sigma8" } }

[cosmology]
enabled      = true
omega_m      = 0.3153
omega_lambda = 0.6847
h0           = 0.1
a_init       = 0.02               # z_init ≈ 49
periodic     = true
auto_g       = true

[timestep]
criterion    = "jerk"
eta          = 0.025
dt_max       = 0.005
dt_min       = 1e-7
hierarchical = true

[output]
snapshot_interval = 100           # ~6 snapshots: z≈15, 9, 5, 2, 1, 0
snapshot_format   = "jsonl"
dir               = "out_simd"

[gravity]
solver       = "tree_pm"
pm_grid_size = 256                # 2× partículas por eje → mejor alias
r_split      = 0.0
