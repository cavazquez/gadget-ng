[simulation]
dt = 0.05
num_steps = 150
softening = 1.0
particle_count = 2097152
box_size = 1000.0
seed = 42
integrator = "leapfrog"

[initial_conditions]
kind = { zeldovich = { seed = 42, grid_size = 128, spectral_index = 0.965, transfer = { tabulated = { path = "class_tk_mock.dat" } }, sigma8 = 0.81, box_size_mpc_h = 1000.0, use_2lpt = true, normalization_mode = "z0_sigma8" } }

[cosmology]
enabled = true
omega_m = 0.315
omega_lambda = 0.685
h0 = 0.1
a_init = 0.02
periodic = true
auto_g = true

[output]
snapshot_interval = 150
snapshot_format = "jsonl"
dir = "out_simd"

[gravity]
solver = "pm"
pm_grid_size = 256
