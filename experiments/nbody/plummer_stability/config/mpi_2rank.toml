# ── Plummer Stability: ejecución MPI 2 rangos ────────────────────────────────
# Configuración idéntica al caso serial para verificar paridad numérica.
# Ejecutar con: mpirun -n 2 gadget-ng stepping --config ...

[simulation]
particle_count         = 200
box_size               = 20.0
dt                     = 0.025
num_steps              = 1000
softening              = 0.05
gravitational_constant = 1.0
seed                   = 42

[initial_conditions]
kind = { plummer = { a = 1.0 } }

[gravity]
solver = "barnes_hut"
theta  = 0.5

[output]
snapshot_format   = "jsonl"
snapshot_interval = 10

[performance]
deterministic = true
