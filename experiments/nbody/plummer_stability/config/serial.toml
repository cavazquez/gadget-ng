# ── Plummer Stability: ejecución serial ─────────────────────────────────────
#
# Esfera de Plummer: N=200, a=1, G=1, M_total=1.
#
# Tiempos de cruce:
#   t_cross = sqrt(6·a³/(G·M)) ≈ 2.449 [unidades internas]
#   dt = t_cross/100 ≈ 0.02449
#   t_total = 10·t_cross ≈ 24.49  →  num_steps ≈ 1000
#
# Se guardan 100 snapshots intermedios (cada 10 pasos) para la serie temporal.

[simulation]
particle_count         = 200
box_size               = 20.0
dt                     = 0.025        # ≈ t_cross/100
num_steps              = 1000         # ≈ 10·t_cross
softening              = 0.05         # ε = 0.05·a
gravitational_constant = 1.0
seed                   = 42

[initial_conditions]
kind = { plummer = { a = 1.0 } }

[gravity]
solver = "barnes_hut"
theta  = 0.5

[output]
snapshot_format   = "jsonl"
snapshot_interval = 10   # 100 frames para la serie temporal

[performance]
deterministic = true   # garantiza paridad serial/MPI
