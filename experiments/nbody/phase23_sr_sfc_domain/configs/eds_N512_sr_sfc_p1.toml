# ── EdS N=512, TreePM SR-SFC Dominio 3D (Fase 23) — P=1 ──────────────────────
#
# Baseline serial: path treepm_sr_sfc en 1 rank.
# En P=1 el dominio SFC y la migración PM son no-ops; resultado idéntico a
# treepm_slab_3d. Sirve como baseline de correctitud para comparar con P>1.
#
# path_active = "treepm_sr_sfc_3d"

[simulation]
particle_count      = 512
box_size            = 1.0
dt                  = 0.005
num_steps           = 20
softening           = 0.01
gravitational_constant = 1.0
seed                = 42

[initial_conditions]
kind = { perturbed_lattice = { amplitude = 0.05, velocity_amplitude = 0.0 } }

[cosmology]
enabled       = true
periodic      = true
omega_m       = 1.0
omega_lambda  = 0.0
h0            = 0.1
a_init        = 0.02

[gravity]
solver          = "tree_pm"
pm_grid_size    = 32
treepm_slab     = true
treepm_halo_3d  = true
treepm_sr_sfc   = true
