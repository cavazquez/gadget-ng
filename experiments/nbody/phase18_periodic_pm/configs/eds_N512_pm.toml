# ── EdS N=512, PM periódico — Fase 18 ────────────────────────────────────────
#
# Validación de cosmología periódica con solver PM.
# Con periodic=true + solver=pm, activa: PM+G/a+wrap_position.

[simulation]
particle_count      = 512
box_size            = 1.0
dt                  = 0.005
num_steps           = 20
softening           = 0.0     # PM tiene suavizado natural a escala de celda
gravitational_constant = 1.0
seed                = 12345

[initial_conditions]
kind = { perturbed_lattice = { amplitude = 0.05, velocity_amplitude = 0.0 } }

[cosmology]
enabled       = true
periodic      = true
omega_m       = 1.0
omega_lambda  = 0.0
h0            = 0.1
a_init        = 1.0

[gravity]
solver        = "pm"
pm_grid_size  = 16
