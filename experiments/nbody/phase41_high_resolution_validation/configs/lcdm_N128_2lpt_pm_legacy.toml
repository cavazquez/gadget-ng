# ── ΛCDM N=128³, EH+σ₈=0.8, 2LPT, PM, a_init=0.02 — Fase 41 (legacy) ──────
#
# Modo `legacy` a N=128³ como comparativa del modo físico `z0_sigma8` a la
# misma resolución. Phase 41 demuestra que al superar el shot-noise floor
# (`P_shot = V/N_p`), la señal del modo físico deja de estar contaminada por
# el ruido de muestreo y la amplitud absoluta converge a la referencia lineal.

[simulation]
particle_count         = 2097152
box_size               = 1.0
dt                     = 0.0004
num_steps              = 200
softening              = 0.0025
gravitational_constant = 1.0
seed                   = 42

[initial_conditions.kind.zeldovich]
seed               = 42
grid_size          = 128
spectral_index     = 0.965
amplitude          = 1.0e-4
transfer           = "eisenstein_hu"
sigma8             = 0.8
omega_b            = 0.049
h                  = 0.674
t_cmb              = 2.7255
box_size_mpc_h     = 100.0
use_2lpt           = true
normalization_mode = "legacy"

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.02

[gravity]
solver       = "pm"
pm_grid_size = 128

[output]
snapshot_every    = 50
diagnostics_every = 50
