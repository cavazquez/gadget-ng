# ── ΛCDM N=256³, EH+σ₈=0.8, 2LPT, PM, a_init=0.02 — Fase 41 (z0_sigma8) ──
#
# Alta resolución (16.7M partículas) con modo físico. Phase 41 espera que a
# N=256³ el shot-noise floor sea despreciable frente a la señal `z0_sigma8` en
# todo el rango lineal, lo que permite validar crecimiento lineal y amplitud
# absoluta en snapshots evolucionados.

[simulation]
particle_count         = 16777216
box_size               = 1.0
dt                     = 0.0004
num_steps              = 200
softening              = 0.00125
gravitational_constant = 1.0
seed                   = 42

[initial_conditions.kind.zeldovich]
seed               = 42
grid_size          = 256
spectral_index     = 0.965
amplitude          = 1.0e-4
transfer           = "eisenstein_hu"
sigma8             = 0.8
omega_b            = 0.049
h                  = 0.674
t_cmb              = 2.7255
box_size_mpc_h     = 100.0
use_2lpt           = true
normalization_mode = "z0_sigma8"

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.02

[gravity]
solver       = "pm"
pm_grid_size = 256

[output]
snapshot_every    = 50
diagnostics_every = 50
