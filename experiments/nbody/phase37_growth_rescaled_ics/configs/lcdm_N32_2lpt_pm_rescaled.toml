# ── ΛCDM N=32³, EH+σ₈=0.8, 2LPT, PM, a_init=0.02 — Fase 37 (rescaled) ──────
#
# Modo físico reescalado: `rescale_to_a_init = true`. σ₈ queda referido a
# `a=1` (convención estándar CAMB/CLASS); las amplitudes LPT se reducen por
# `s = D(a_init)/D(1)` (Ψ¹ ← s·Ψ¹, Ψ² ← s²·Ψ²). Idéntica a
# `lcdm_N32_2lpt_pm_legacy.toml` salvo por el flag.

[simulation]
particle_count         = 32768
box_size               = 1.0
dt                     = 0.0004
num_steps              = 10
softening              = 0.01
gravitational_constant = 1.0
seed                   = 42

[initial_conditions.kind.zeldovich]
seed              = 42
grid_size         = 32
spectral_index    = 0.965
amplitude         = 1.0e-4
transfer          = "eisenstein_hu"
sigma8            = 0.8
omega_b           = 0.049
h                 = 0.674
t_cmb             = 2.7255
box_size_mpc_h    = 100.0
use_2lpt          = true
normalization_mode = "z0_sigma8"     # ← Fase 37: reescalado físico s = D(a_init)/D(1)

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.02

[gravity]
solver       = "pm"
pm_grid_size = 32

[output]
snapshot_every    = 10
diagnostics_every = 1
