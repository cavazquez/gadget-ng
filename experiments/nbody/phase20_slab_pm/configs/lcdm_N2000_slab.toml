# ── ΛCDM N=2000, PM Slab Distribuido (Fase 20) — grid 32³ ───────────────────
#
# ΛCDM estándar con cosmología realista. Malla 32³ dividida entre ranks.
# Requiere pm_grid_size (32) % n_ranks == 0 → compatible con P=1,2,4,8.

[simulation]
particle_count      = 2000
box_size            = 1.0
dt                  = 0.003
num_steps           = 30
softening           = 0.01
gravitational_constant = 1.0
seed                = 42

[initial_conditions]
kind = { perturbed_lattice = { amplitude = 0.05, velocity_amplitude = 0.01 } }

[cosmology]
enabled       = true
periodic      = true
omega_m       = 0.3
omega_lambda  = 0.7
h0            = 70.0
a_init        = 0.05

[gravity]
solver          = "pm"
pm_grid_size    = 32
pm_slab         = true
