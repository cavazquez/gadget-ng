# ── EdS N=512, PM Slab Distribuido (Fase 20) — grid 16³ ──────────────────────
#
# Configuración base para validar que el path PM slab produce resultados
# físicamente idénticos al path serial y al Phase 19.
# pm_slab = true activa: deposit_slab_extended → exchange_halos → solve_slab (alltoall)
# Requiere pm_grid_size % n_ranks == 0.

[simulation]
particle_count      = 512
box_size            = 1.0
dt                  = 0.005
num_steps           = 20
softening           = 0.0
gravitational_constant = 1.0
seed                = 12345

[initial_conditions]
kind = { perturbed_lattice = { amplitude = 0.05, velocity_amplitude = 0.0 } }

[cosmology]
enabled       = true
periodic      = true
omega_m       = 1.0
omega_lambda  = 0.0
h0            = 0.1
a_init        = 1.0

[gravity]
solver          = "pm"
pm_grid_size    = 16
pm_slab         = true
