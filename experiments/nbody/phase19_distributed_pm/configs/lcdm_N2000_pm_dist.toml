# ── ΛCDM N=2000, PM Distribuido (Fase 19) — grid 32³ ─────────────────────────
#
# Valida PM distribuido con ΛCDM y N moderado. El grid 32³ produce 32768 celdas
# vs 2000 partículas: comunicación O(nm³) = O(32768) < O(N·P=2000·P).
# Para P=4: allgather = 2000·5·8 = 80KB vs allreduce = 32768·8 = 256KB (aún razonable).

[simulation]
particle_count      = 2000
box_size            = 1.0
dt                  = 0.005
num_steps           = 20
softening           = 0.0
gravitational_constant = 1.0
seed                = 42

[initial_conditions]
kind = { perturbed_lattice = { amplitude = 0.05, velocity_amplitude = 0.0 } }

[cosmology]
enabled       = true
periodic      = true
omega_m       = 0.3
omega_lambda  = 0.7
h0            = 0.7
a_init        = 0.1

[gravity]
solver          = "pm"
pm_grid_size    = 32
pm_distributed  = true
