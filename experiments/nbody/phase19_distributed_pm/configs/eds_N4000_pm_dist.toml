# ── EdS N=4000, PM Distribuido (Fase 19) — grid 32³ ──────────────────────────
#
# N grande para medir la ventaja del path distribuido sobre el allgather clásico.
# Para P=4: allgather = 4000·5·8 = 160KB vs allreduce = 32768·8 = 256KB.
# Para P=8: allgather = 4000·5·8 = 160KB vs allreduce = 262KB — umbral cerca.
# Para N=100000: allgather = 40MB >> allreduce = 256KB (ventaja masiva futura).

[simulation]
particle_count      = 4000
box_size            = 1.0
dt                  = 0.005
num_steps           = 15
softening           = 0.0
gravitational_constant = 1.0
seed                = 99999

[initial_conditions]
kind = { perturbed_lattice = { amplitude = 0.05, velocity_amplitude = 0.0 } }

[cosmology]
enabled       = true
periodic      = true
omega_m       = 1.0
omega_lambda  = 0.0
h0            = 0.1
a_init        = 1.0

[gravity]
solver          = "pm"
pm_grid_size    = 32
pm_distributed  = true
