# ── EdS N=512, PM Distribuido (Fase 19) — grid 16³ ───────────────────────────
#
# Configuración base para validar que el path PM distribuido produce resultados
# físicamente idénticos al path clásico (allgather) de Fase 18.
# pm_distributed = true activa el pipeline: deposit_local → allreduce(nm³) → solve → interpolate.

[simulation]
particle_count      = 512
box_size            = 1.0
dt                  = 0.005
num_steps           = 20
softening           = 0.0
gravitational_constant = 1.0
seed                = 12345

[initial_conditions]
kind = { perturbed_lattice = { amplitude = 0.05, velocity_amplitude = 0.0 } }

[cosmology]
enabled       = true
periodic      = true
omega_m       = 1.0
omega_lambda  = 0.0
h0            = 0.1
a_init        = 1.0

[gravity]
solver          = "pm"
pm_grid_size    = 16
pm_distributed  = true
