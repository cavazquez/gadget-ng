# ── EdS N=512, PM Clásico (Fase 18) — grid 16³ ───────────────────────────────
#
# Configuración de referencia SIN pm_distributed. Idéntica a la Fase 18.
# Se usa para comparar resultados y tiempos contra el path distribuido.

[simulation]
particle_count      = 512
box_size            = 1.0
dt                  = 0.005
num_steps           = 20
softening           = 0.0
gravitational_constant = 1.0
seed                = 12345

[initial_conditions]
kind = { perturbed_lattice = { amplitude = 0.05, velocity_amplitude = 0.0 } }

[cosmology]
enabled       = true
periodic      = true
omega_m       = 1.0
omega_lambda  = 0.0
h0            = 0.1
a_init        = 1.0

[gravity]
solver          = "pm"
pm_grid_size    = 16
pm_distributed  = false
