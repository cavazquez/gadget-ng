# ── EdS N=32³, n_s=−1, TreePM periódico — Fase 26: Zel'dovich ICs ─────────────
#
# Caso alternativo con espectro más plano (n_s = −1).
# Permite comparar el comportamiento del generador bajo distinta distribución
# de potencia entre modos.
#
# Mismo seed y cosmología que el caso n_s=-2 para comparabilidad.

[simulation]
particle_count         = 32768     # 32³
box_size               = 1.0
dt                     = 0.0004
num_steps              = 50
softening              = 0.01
gravitational_constant = 1.0
seed                   = 42

[initial_conditions]
kind = { zeldovich = { seed = 42, grid_size = 32, spectral_index = -1.0, amplitude = 1.0e-4 } }

[cosmology]
enabled      = true
periodic     = true
omega_m      = 1.0
omega_lambda = 0.0
h0           = 0.1
a_init       = 0.02

[gravity]
solver       = "tree_pm"
pm_grid_size = 32

[output]
snapshot_every = 10
diagnostics_every = 1
