# ── ΛCDM N=32³, EH+σ₈=0.8, 2LPT, PM, a_init=0.02 — Fase 38 (rescaled) ──────
#
# Modo rescaled: `rescale_to_a_init = true`. Los ICs quedan reducidos por
# `s = D(a_init)/D(1) ≈ 2.54e-2`, por lo que P_m(IC) ≈ P_linear(k, z=49)
# en convención CAMB/CLASS estándar. Se compara contra
# `reference/pk_class_z49.dat`.

[simulation]
particle_count         = 32768
box_size               = 1.0
dt                     = 0.0004
num_steps              = 1
softening              = 0.01
gravitational_constant = 1.0
seed                   = 42

[initial_conditions.kind.zeldovich]
seed              = 42
grid_size         = 32
spectral_index    = 0.965
amplitude         = 1.0e-4
transfer          = "eisenstein_hu"
sigma8            = 0.8
omega_b           = 0.049
h                 = 0.674
t_cmb             = 2.7255
box_size_mpc_h    = 100.0
use_2lpt          = true
normalization_mode = "z0_sigma8"

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.02

[gravity]
solver       = "pm"
pm_grid_size = 32

[output]
snapshot_every    = 1
diagnostics_every = 1
