# -----------------------------------------------------------------------------
# Phase 38 — CLASS reference for gadget-ng validation
# -----------------------------------------------------------------------------
# Cosmology: Planck-like ΛCDM, same parameters as Phases 27–37.
#   Ω_m      = 0.315
#   Ω_b      = 0.049
#   Ω_cdm    = 0.266  (= Ω_m − Ω_b)
#   h        = 0.674
#   n_s      = 0.965
#   σ_8      = 0.8
#   T_CMB    = 2.7255 K
#
# Output: linear matter power spectrum P(k) at z ∈ {0, 49}, in (Mpc/h)^3,
# with k in h/Mpc. Range covers gadget-ng's valid window for N ≤ 64³ with
# Box = 100 Mpc/h (k_Nyq/2 ≈ 1.0 h/Mpc), with ample margin.
# -----------------------------------------------------------------------------

# ── Background ───────────────────────────────────────────────────────────────
h            = 0.674
Omega_b      = 0.049
Omega_cdm    = 0.266
T_cmb        = 2.7255
N_ur         = 3.046
N_ncdm       = 0

# ── Primordial spectrum ──────────────────────────────────────────────────────
n_s          = 0.965
# Normalise via σ_8 (CLASS rescales the primordial amplitude A_s).
sigma8       = 0.8

# ── Output ───────────────────────────────────────────────────────────────────
output       = mPk
# Linear P(k) only (no halofit / HMcode).
non_linear   = none

# Redshifts at which P(k) is tabulated. CLASS writes files
#   class_pk.dat      for z = z_pk[0] (= 0)
#   class_pk_z1.dat   for z = z_pk[1] (= 49)
z_pk         = 0, 49
z_max_pk     = 50.0

# k range in h/Mpc (CLASS will rescale internally to its k_per_decade grid).
P_k_max_h/Mpc = 20.0
k_per_decade_for_pk = 50

# Precision: CLASS defaults are sufficient for this validation.
# (We do NOT tweak tol_ncdm_*, ncdm_fluid_approximation, etc.)

# Root for output files.
root         = class_
format       = camb

# ── Verbosity (set to 1 for reproducibility logs, 0 to silence) ──────────────
input_verbose       = 1
background_verbose  = 1
thermodynamics_verbose = 1
perturbations_verbose  = 1
transfer_verbose    = 1
primordial_verbose  = 1
harmonic_verbose    = 1
fourier_verbose     = 1
lensing_verbose     = 1
distortions_verbose = 1
output_verbose      = 1
