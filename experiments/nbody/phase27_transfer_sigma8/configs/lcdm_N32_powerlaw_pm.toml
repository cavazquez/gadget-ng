# ── ΛCDM N=32³, ley de potencia pura (legacy Fase 26), PM periódico — Fase 27 ─
#
# Caso de referencia para comparación: misma amplitud y espectro que Fase 26,
# sin función de transferencia. Permite cuantificar el cambio de pendiente del espectro
# al agregar T(k) de Eisenstein–Hu.
#
# Espectro: P(k) ∝ k^{n_s} con n_s = 0.965 (Planck18 n_s, sin T(k))
# amplitude = 1.0e-3: ajustado para que los desplazamientos sean visibles
#   pero sigan en régimen lineal (Ψ_rms/d < 0.3)
#
# Cosmología: ΛCDM Planck18 (misma que el caso EH para comparación directa).
# Caja física: 100 Mpc/h (misma escala, aunque T(k)=1 aquí).

[simulation]
particle_count         = 32768
box_size               = 1.0
dt                     = 0.0004
num_steps              = 50
softening              = 0.01
gravitational_constant = 1.0
seed                   = 42

[initial_conditions]
kind = { zeldovich = {
    seed           = 42,
    grid_size      = 32,
    spectral_index = 0.965,
    amplitude      = 1.0e-3,
    transfer       = "power_law"
} }

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.02

[gravity]
solver       = "pm"
pm_grid_size = 32

[output]
snapshot_every    = 10
diagnostics_every = 1
