# ── ΛCDM N=32³, Eisenstein–Hu no-wiggle + σ₈=0.8, TreePM periódico — Fase 27 ─
#
# Idéntico a lcdm_N32_eh_pm.toml pero usando TreePM.
# Permite comparar PM vs TreePM en régimen lineal con ICs realistas.
#
# Espectro: P(k) = A²·k^{n_s}·T²_EH(k), σ₈=0.8, Planck18.
# Cosmología: ΛCDM Planck18 (Ω_m=0.315, Ω_Λ=0.685), a_init=0.02.
# Caja física: 100 Mpc/h.

[simulation]
particle_count         = 32768
box_size               = 1.0
dt                     = 0.0004
num_steps              = 50
softening              = 0.01
gravitational_constant = 1.0
seed                   = 42

[initial_conditions]
kind = { zeldovich = {
    seed            = 42,
    grid_size       = 32,
    spectral_index  = 0.965,
    amplitude       = 1.0e-4,
    transfer        = "eisenstein_hu",
    sigma8          = 0.8,
    omega_b         = 0.049,
    h               = 0.674,
    t_cmb           = 2.7255,
    box_size_mpc_h  = 100.0
} }

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.02

[gravity]
solver       = "tree_pm"
pm_grid_size = 32
theta        = 0.5

[output]
snapshot_every    = 10
diagnostics_every = 1
