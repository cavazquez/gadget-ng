# ── ΛCDM N=32³, Eisenstein–Hu no-wiggle + σ₈=0.8, PM periódico — Fase 27 ──────
#
# Caso principal para validación de ICs con función de transferencia realista.
#
# Espectro de potencia:
#   P(k) = A² · k^{n_s} · T²(k)    con T(k) = Eisenstein–Hu no-wiggle
#   n_s = 0.965  (Planck18)
#   σ₈  = 0.8    (normalización por integración de σ(R) con top-hat R=8 Mpc/h)
#
# Cosmología base (Planck 2018, TT+TE+EE+lowE+lensing):
#   Ω_m = 0.315,  Ω_Λ = 0.685,  Ω_b = 0.049,  h = 0.674,  T_CMB = 2.7255 K
#   a_init = 0.02  (z ≈ 49)
#
# Caja física: 100 Mpc/h  (box_size_mpc_h = 100.0)
#   Modos: k_fund = 2π/100 ≈ 0.063 h/Mpc   (bien dentro del régimen suprimido)
#          k_Nyq  = π·32/100 ≈ 1.0 h/Mpc
#
# Unidades internas: L=1, G=1, h0=0.1 (H₀ en unidades internas 1/t_sim)
# Los modos k del grid se convierten a h/Mpc usando box_size_mpc_h.
#
# Métricas a medir (con scripts Python):
#   - P(k) inicial vs P(k) = A²·k^n_s·T²(k)
#   - σ₈ medido vs target = 0.8
#   - delta_rms(a) vs D(a)/D(a_init)
#   - v_rms inicial
#   - P(k) EH vs P(k) power-law (compare_spectra.py)

[simulation]
particle_count         = 32768     # 32³
box_size               = 1.0
dt                     = 0.0004
num_steps              = 50
softening              = 0.01
gravitational_constant = 1.0
seed                   = 42

[initial_conditions]
kind = { zeldovich = {
    seed            = 42,
    grid_size       = 32,
    spectral_index  = 0.965,
    amplitude       = 1.0e-4,      # ignorado cuando sigma8 está definido
    transfer        = "eisenstein_hu",
    sigma8          = 0.8,
    omega_b         = 0.049,
    h               = 0.674,
    t_cmb           = 2.7255,
    box_size_mpc_h  = 100.0
} }

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.02

[gravity]
solver       = "pm"
pm_grid_size = 32

[output]
snapshot_every    = 10
diagnostics_every = 1
