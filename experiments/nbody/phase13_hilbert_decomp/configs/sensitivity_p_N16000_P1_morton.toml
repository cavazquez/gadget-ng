[simulation]
num_steps      = 10
dt             = 0.025
softening      = 0.5
particle_count = 16000
box_size       = 20.0
seed           = 42

[initial_conditions]
kind = { plummer = { a = 2.0 } }

[gravity]
solver              = "barnes_hut"
theta               = 0.5
mac_softening       = "consistent"
opening_criterion   = "relative"
softened_multipoles = true
multipole_order     = 3

[performance]
use_distributed_tree    = false
force_allgather_fallback = false
use_sfc                 = true
sfc_rebalance_interval  = 5
let_nonblocking         = true
use_let_tree            = true
let_tree_threshold      = 64
let_tree_leaf_max       = 8
let_theta_export_factor = 0.0
sfc_kind                = "morton"

[output]
checkpoint_interval = 0
snapshot_interval   = 0
