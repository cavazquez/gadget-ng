# ── ΛCDM N=32³, EH+σ₈=0.8, 2LPT, TreePM, a_init=0.05 — Fase 29 ────────────
#
# CASO 2LPT + TREEPM INTERMEDIO: verificación TreePM con inicio z≈19.
#
# Combina el inicio intermedio (a_init=0.05) con TreePM y 2LPT.
# Permite verificar la consistencia entre PM y TreePM para el régimen
# intermedio donde la corrección de velocidad 2LPT tiene mayor impacto.

[simulation]
particle_count         = 32768
box_size               = 1.0
dt                     = 0.0004
num_steps              = 50
softening              = 0.01
gravitational_constant = 1.0
seed                   = 12345

[initial_conditions]
kind = { zeldovich = {
    seed            = 12345,
    grid_size       = 32,
    spectral_index  = 0.965,
    amplitude       = 1.0e-4,
    transfer        = "eisenstein_hu",
    sigma8          = 0.8,
    omega_b         = 0.049,
    h               = 0.674,
    t_cmb           = 2.7255,
    box_size_mpc_h  = 100.0,
    use_2lpt        = true
} }

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.05             # z ≈ 19

[gravity]
solver       = "tree_pm"
pm_grid_size = 32
theta        = 0.5

[output]
snapshot_every    = 10
diagnostics_every = 1
