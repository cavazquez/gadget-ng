# ── ΛCDM N=32³, EH+σ₈=0.8, 1LPT (Zel'dovich), PM — Fase 29 ─────────────────
#
# CASO CONTROL: inicio temprano z≈49 (a_init=0.02), ICs Zel'dovich (1LPT).
#
# Este caso es la referencia base de comparación para todos los experimentos.
# Las diferencias observadas respecto a los casos 2LPT miden el impacto de las
# correcciones de segundo orden.
#
# Nota sobre a_init:
#   En gadget-ng, a_init afecta únicamente las velocidades (p = a²·f·H·Ψ).
#   Las posiciones se fijan por la normalización σ₈, independientemente de a_init.
#   El experimento a_init=0.02 vs 0.05 vs 0.10 explora el efecto de la
#   corrección de velocidad 2LPT en distintos regímenes.
#
# Parámetros fijos para comparabilidad con todos los casos de Phase 29:
#   seed = 12345,  n_s = 0.965,  σ₈ = 0.8,  box = 100 Mpc/h
#   num_steps = 50,  dt = 0.0004

[simulation]
particle_count         = 32768     # 32³
box_size               = 1.0
dt                     = 0.0004
num_steps              = 50
softening              = 0.01
gravitational_constant = 1.0
seed                   = 12345

[initial_conditions]
kind = { zeldovich = {
    seed            = 12345,
    grid_size       = 32,
    spectral_index  = 0.965,
    amplitude       = 1.0e-4,      # ignorado cuando sigma8 está definido
    transfer        = "eisenstein_hu",
    sigma8          = 0.8,
    omega_b         = 0.049,
    h               = 0.674,
    t_cmb           = 2.7255,
    box_size_mpc_h  = 100.0,
    use_2lpt        = false
} }

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.02             # z ≈ 49 — inicio temprano (control)

[gravity]
solver       = "pm"
pm_grid_size = 32

[output]
snapshot_every    = 10
diagnostics_every = 1
