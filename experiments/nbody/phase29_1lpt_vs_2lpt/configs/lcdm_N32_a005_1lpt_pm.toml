# ── ΛCDM N=32³, EH+σ₈=0.8, 1LPT, PM, a_init=0.05 — Fase 29 ─────────────────
#
# CASO 1LPT INTERMEDIO: inicio z≈19 (a_init=0.05), ICs Zel'dovich.
#
# El inicio más tardío genera velocidades más grandes (p = a²·f·H·Ψ).
# La corrección de velocidad 2LPT es proporcionalmente idéntica (mismo ratio),
# pero los transientes absolutos son mayores en unidades de tiempo de simulación.
# Comparar con el caso a_init=0.02 ilustra el efecto del escalado de velocidades.
#
# Nota: las POSICIONES son idénticas al caso a_init=0.02 porque la amplitud
# está fijada por σ₈ independientemente de a_init (ver docs).

[simulation]
particle_count         = 32768
box_size               = 1.0
dt                     = 0.0004
num_steps              = 50
softening              = 0.01
gravitational_constant = 1.0
seed                   = 12345

[initial_conditions]
kind = { zeldovich = {
    seed            = 12345,
    grid_size       = 32,
    spectral_index  = 0.965,
    amplitude       = 1.0e-4,
    transfer        = "eisenstein_hu",
    sigma8          = 0.8,
    omega_b         = 0.049,
    h               = 0.674,
    t_cmb           = 2.7255,
    box_size_mpc_h  = 100.0,
    use_2lpt        = false
} }

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.05             # z ≈ 19 — inicio intermedio

[gravity]
solver       = "pm"
pm_grid_size = 32

[output]
snapshot_every    = 10
diagnostics_every = 1
