# ── ΛCDM N=32³, EH+σ₈=0.8, 2LPT, PM, a_init=0.10 — Fase 29 ─────────────────
#
# CASO 2LPT TARDÍO: inicio z≈9 (a_init=0.10), ICs de segundo orden.
#
# Caso donde la corrección de velocidad 2LPT es más relevante:
# el campo de velocidades 1LPT a z≈9 tiene transientes más grandes
# (en unidades absolutas) que a z≈49.
# La comparación con el caso 1LPT a_init=0.10 cuantifica la mejora real.

[simulation]
particle_count         = 32768
box_size               = 1.0
dt                     = 0.0004
num_steps              = 50
softening              = 0.01
gravitational_constant = 1.0
seed                   = 12345

[initial_conditions]
kind = { zeldovich = {
    seed            = 12345,
    grid_size       = 32,
    spectral_index  = 0.965,
    amplitude       = 1.0e-4,
    transfer        = "eisenstein_hu",
    sigma8          = 0.8,
    omega_b         = 0.049,
    h               = 0.674,
    t_cmb           = 2.7255,
    box_size_mpc_h  = 100.0,
    use_2lpt        = true
} }

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.10             # z ≈ 9 — inicio tardío

[gravity]
solver       = "pm"
pm_grid_size = 32

[output]
snapshot_every    = 10
diagnostics_every = 1
