# ── ΛCDM N=32³, EH+σ₈=0.8, 2LPT, PM, a_init=0.05 — Fase 29 ─────────────────
#
# CASO 2LPT INTERMEDIO: inicio z≈19 (a_init=0.05), ICs de segundo orden.
#
# La corrección de velocidad 2LPT (f₂·D₂/D₁²·Ψ²) modifica el campo de
# velocidades manteniendo las posiciones idénticas al caso 1LPT.
# Con a_init mayor, el efecto absoluto de los transientes es mayor.

[simulation]
particle_count         = 32768
box_size               = 1.0
dt                     = 0.0004
num_steps              = 50
softening              = 0.01
gravitational_constant = 1.0
seed                   = 12345

[initial_conditions]
kind = { zeldovich = {
    seed            = 12345,
    grid_size       = 32,
    spectral_index  = 0.965,
    amplitude       = 1.0e-4,
    transfer        = "eisenstein_hu",
    sigma8          = 0.8,
    omega_b         = 0.049,
    h               = 0.674,
    t_cmb           = 2.7255,
    box_size_mpc_h  = 100.0,
    use_2lpt        = true
} }

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.05             # z ≈ 19 — inicio intermedio

[gravity]
solver       = "pm"
pm_grid_size = 32

[output]
snapshot_every    = 10
diagnostics_every = 1
