# Misma corrida que `default.toml` pero con Rayon activo (requiere `cargo build --features simd`).
# Con `deterministic = false` el orden de suma puede diferir paso a paso, y la paridad
# serial/MPI bit-a-bit ya no está garantizada.
[simulation]
dt = 0.001
num_steps = 50
softening = 0.05
gravitational_constant = 1.0
particle_count = 8
box_size = 1.0
seed = 42

[initial_conditions]
kind = "lattice"

[output]
snapshot_format = "jsonl"

[performance]
deterministic = false
# num_threads = 4   # descomentando se fija el pool global de Rayon
