# ── ΛCDM N=2000, TreePM Fase 24 (scatter/gather PM) — P=1 ────────────────────
#
# Validación física en cosmología ΛCDM con scatter/gather PM.

[simulation]
particle_count         = 2000
box_size               = 1.0
dt                     = 0.005
num_steps              = 10
softening              = 0.006
gravitational_constant = 1.0
seed                   = 456

[initial_conditions]
kind = { perturbed_lattice = { amplitude = 0.04, velocity_amplitude = 0.0 } }

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.3
omega_lambda = 0.7
h0           = 0.7
a_init       = 0.02

[gravity]
solver                  = "tree_pm"
pm_grid_size            = 32
treepm_slab             = true
treepm_halo_3d          = true
treepm_sr_sfc           = true
treepm_pm_scatter_gather = true
