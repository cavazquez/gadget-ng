# ── EdS N=512, TreePM Fase 23 (clone+migrate) — baseline comparación ─────────
#
# Path de Fase 23: clone → exchange_domain_by_z → PM → exchange_domain_sfc → HashMap
# Sirve como baseline para medir el overhead que elimina Fase 24.
#
# path_active = "treepm_sr_sfc_3d" (clone path, sin scatter/gather)

[simulation]
particle_count         = 512
box_size               = 1.0
dt                     = 0.005
num_steps              = 20
softening              = 0.01
gravitational_constant = 1.0
seed                   = 42

[initial_conditions]
kind = { perturbed_lattice = { amplitude = 0.05, velocity_amplitude = 0.0 } }

[cosmology]
enabled      = true
periodic     = true
omega_m      = 1.0
omega_lambda = 0.0
h0           = 0.1
a_init       = 0.02

[gravity]
solver                  = "tree_pm"
pm_grid_size            = 32
treepm_slab             = true
treepm_halo_3d          = true
treepm_sr_sfc           = true
treepm_pm_scatter_gather = false
