# Generated by phase7/generate_configs.py
# dist=uniform  N=200  variant=fixed_dt  dt=0.0125
# Solver V5, T=25, 100 snapshots

[simulation]
particle_count         = 200
box_size               = 4.0
dt                     = 0.0125
num_steps              = 2000
softening              = 0.05
