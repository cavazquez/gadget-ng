# Generated by phase7/generate_configs.py
# dist=uniform  N=200  variant=hier_acc_eta020
# Solver V5, block timesteps, criterion=acceleration, eta=0.02

[simulation]
particle_count         = 200
box_size               = 4.0
dt                     = 0.025
num_steps              = 1000
softening              = 0.05
gravitational_constant = 1.0
seed                   = 42
integrator             = "leapfrog"

[initial_conditions]
kind = { uniform_sphere = { r = 1.0 } }

[timestep]
hierarchical = true
criterion    = "acceleration"
eta          = 0.02
max_level    = 6

[gravity]
solver              = "barnes_hut"
theta               = 0.5
multipole_order     = 3
opening_criterion   = "relative"
err_tol_force_acc   = 0.005
softened_multipoles = true
mac_softening       = "consistent"

[output]
snapshot_format   = "jsonl"
snapshot_interval = 10

[performance]
deterministic = true
