# ── ΛCDM N=32³, EH+σ₈=0.8, 2LPT, PM, a_init=0.05 — Fase 31 ─────────────────
#
# TEMPLATE BASE: el script run_phase31.sh itera sobre seeds sustituiendo SEED=42.
#
# Caso 2LPT tardío: inicio z≈19 (a_init=0.05). La comparación con a_init=0.02
# permite explorar si la mejora de 2LPT sobre 1LPT depende del inicio.
#
# En gadget-ng, a_init afecta SOLO las velocidades (factor f·H·a).
# Las posiciones Zel'dovich tienen la misma amplitud independientemente de a_init.
# La diferencia 2LPT vs 1LPT en velocidades es proporcional a f₂ ≈ 2f₁.

[simulation]
particle_count         = 32768
box_size               = 1.0
dt                     = 0.001
num_steps              = 50
softening              = 0.01
gravitational_constant = 1.0
seed                   = 42        # sustituido por run_phase31.sh

[initial_conditions]
kind = { zeldovich = {
    seed            = 42,          # sustituido por run_phase31.sh
    grid_size       = 32,
    spectral_index  = 0.965,
    amplitude       = 1.0e-4,
    transfer        = "eisenstein_hu",
    sigma8          = 0.8,
    omega_b         = 0.049,
    h               = 0.674,
    t_cmb           = 2.7255,
    box_size_mpc_h  = 100.0,
    use_2lpt        = true
} }

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.05               # z ≈ 19 (inicio tardío)

[gravity]
solver       = "pm"
pm_grid_size = 32

[output]
snapshot_every    = 10
diagnostics_every = 1
