# ── ΛCDM N=32³, EH+σ₈=0.8, 2LPT, PM, a_init=0.02 — Fase 31 ─────────────────
#
# TEMPLATE BASE: el script run_phase31.sh itera sobre seeds sustituiendo SEED=42.
#
# Caso 2LPT temprano: inicio z≈49, segundo orden, solver PM.
# Par directo del caso 1LPT para cuantificar mejora 2LPT en el ensemble.
#
# P_2LPT/P_1LPT ≈ 1 ± 2% en el estado inicial (corrección ~0.4% en posiciones).
# En el estado evolucionado, los transientes reducidos de 2LPT pueden dar
# diferencias de ~10–20% en P(k) de los modos no lineales.

[simulation]
particle_count         = 32768
box_size               = 1.0
dt                     = 0.0004
num_steps              = 50
softening              = 0.01
gravitational_constant = 1.0
seed                   = 42        # sustituido por run_phase31.sh

[initial_conditions]
kind = { zeldovich = {
    seed            = 42,          # sustituido por run_phase31.sh
    grid_size       = 32,
    spectral_index  = 0.965,
    amplitude       = 1.0e-4,
    transfer        = "eisenstein_hu",
    sigma8          = 0.8,
    omega_b         = 0.049,
    h               = 0.674,
    t_cmb           = 2.7255,
    box_size_mpc_h  = 100.0,
    use_2lpt        = true          # 2LPT
} }

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.02

[gravity]
solver       = "pm"
pm_grid_size = 32

[output]
snapshot_every    = 10
diagnostics_every = 1
