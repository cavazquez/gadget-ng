# ── ΛCDM N=32³, EH+σ₈=0.8, 2LPT, TreePM, a_init=0.02 — Fase 31 ────────────
#
# TEMPLATE BASE: el script run_phase31.sh itera sobre seeds sustituiendo SEED=42.
#
# Caso 2LPT + TreePM: permite comparar PM vs TreePM en el ensemble.
# Phase 30 observó 27.3% de diferencia PM/TreePM con N=8³ y 1 seed.
# Phase 31 espera reducir ese error con N=32³ y el ensemble de 4 seeds.
#
# Parámetro theta=0.5 (criterio de apertura del árbol) — valor estándar GADGET.

[simulation]
particle_count         = 32768
box_size               = 1.0
dt                     = 0.0004
num_steps              = 50
softening              = 0.01
gravitational_constant = 1.0
seed                   = 42        # sustituido por run_phase31.sh

[initial_conditions]
kind = { zeldovich = {
    seed            = 42,          # sustituido por run_phase31.sh
    grid_size       = 32,
    spectral_index  = 0.965,
    amplitude       = 1.0e-4,
    transfer        = "eisenstein_hu",
    sigma8          = 0.8,
    omega_b         = 0.049,
    h               = 0.674,
    t_cmb           = 2.7255,
    box_size_mpc_h  = 100.0,
    use_2lpt        = true
} }

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.02

[gravity]
solver       = "tree_pm"
pm_grid_size = 32
theta        = 0.5

[output]
snapshot_every    = 10
diagnostics_every = 1
