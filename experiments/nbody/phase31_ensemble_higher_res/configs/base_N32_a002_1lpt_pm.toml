# ── ΛCDM N=32³, EH+σ₈=0.8, 1LPT, PM, a_init=0.02 — Fase 31 ─────────────────
#
# TEMPLATE BASE: el script run_phase31.sh itera sobre seeds sustituiendo SEED=42
# con cada valor del ensemble [42, 137, 271, 314].
#
# Caso 1LPT temprano: inicio z≈49, Zel'dovich (primer orden), solver PM.
# Comparación directa con 2LPT (misma seed) para cuantificar mejora 2LPT.
#
# Escala: N=32³ = 32768 partículas, caja 100 Mpc/h.
# k_fund  = 2π × 0.674 / 100 ≈ 0.042 h/Mpc
# k_Nyq   = π × 32 × 0.674 / 100 ≈ 0.677 h/Mpc
# N_bins  ≈ 16

[simulation]
particle_count         = 32768
box_size               = 1.0
dt                     = 0.0004
num_steps              = 50
softening              = 0.01
gravitational_constant = 1.0
seed                   = 42        # sustituido por run_phase31.sh para cada seed

[initial_conditions]
kind = { zeldovich = {
    seed            = 42,          # sustituido por run_phase31.sh
    grid_size       = 32,
    spectral_index  = 0.965,
    amplitude       = 1.0e-4,
    transfer        = "eisenstein_hu",
    sigma8          = 0.8,
    omega_b         = 0.049,
    h               = 0.674,
    t_cmb           = 2.7255,
    box_size_mpc_h  = 100.0,
    use_2lpt        = false         # 1LPT
} }

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.02

[gravity]
solver       = "pm"
pm_grid_size = 32

[output]
snapshot_every    = 10
diagnostics_every = 1
