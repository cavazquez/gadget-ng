# ── ΛCDM N=32³, EH+σ₈=0.8, 2LPT, PM, a_init=0.02 — Fase 36 ─────────────────
#
# Configuración de corrida CLI para validar `pk_correction` end-to-end:
# `gadget-ng stepping … --snapshot` + `gadget-ng analyse …` + mirror Python
# de `correct_pk`.
#
# Idéntica a `lcdm_N32_a002_2lpt_pm.toml` (Phase 30) en todos los parámetros
# físicos. Sólo cambia `num_steps = 10` para mantener la corrida corta
# (evidencia del workflow, no campaña exhaustiva — ésa vive in-process en
# `crates/gadget-ng-physics/tests/phase36_pk_correction_validation.rs`).

[simulation]
particle_count         = 32768
box_size               = 1.0
dt                     = 0.0004
num_steps              = 10
softening              = 0.01
gravitational_constant = 1.0
seed                   = 42

[initial_conditions.kind.zeldovich]
seed            = 42
grid_size       = 32
spectral_index  = 0.965
amplitude       = 1.0e-4
transfer        = "eisenstein_hu"
sigma8          = 0.8
omega_b         = 0.049
h               = 0.674
t_cmb           = 2.7255
box_size_mpc_h  = 100.0
use_2lpt        = true

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.02

[gravity]
solver       = "pm"
pm_grid_size = 32

[output]
snapshot_every    = 10
diagnostics_every = 1
