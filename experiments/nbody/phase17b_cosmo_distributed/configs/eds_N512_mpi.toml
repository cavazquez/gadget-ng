# ── EdS N=512, solver=barnes_hut — Fase 17b ──────────────────────────────────
#
# Configuración para benchmarks de equivalencia serial vs MPI (P=1,2,4).
# Con solver=barnes_hut + cosmology.enabled + P>1, activa el path SFC+LET cosmo.
# Con P=1, usa el path allgather cosmo (fallback).
#
# Propósito:
#   - Verificar a(t) vs analítico EdS
#   - Comparar v_rms entre P=1, P=2, P=4
#   - Medir wall time por número de rangos

[simulation]
particle_count      = 512       # 8³ retícula
box_size            = 1.0
dt                  = 0.005
num_steps           = 20
softening           = 0.02
gravitational_constant = 1.0
seed                = 12345

[initial_conditions]
kind = { perturbed_lattice = { amplitude = 0.05, velocity_amplitude = 0.0 } }

[cosmology]
enabled       = true
omega_m       = 1.0
omega_lambda  = 0.0
h0            = 0.1
a_init        = 1.0

[gravity]
solver   = "barnes_hut"
theta    = 0.5

[performance]
deterministic             = false   # Rayon si disponible
sfc_rebalance_interval    = 5
