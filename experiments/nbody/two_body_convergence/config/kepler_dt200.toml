# ── Kepler convergence: dt = T/200 ───────────────────────────────────────────
# T_orbit ≈ 2π ≈ 6.2832  →  dt = T/200 ≈ 0.031416

[simulation]
particle_count         = 2
box_size               = 4.0
dt                     = 0.031416  # T/200
num_steps              = 200
softening              = 1e-6
gravitational_constant = 1.0
seed                   = 0

[initial_conditions]
kind = { two_body = { mass1 = 1.0, mass2 = 1e-6, separation = 1.0 } }

[output]
snapshot_format   = "jsonl"
snapshot_interval = 5
