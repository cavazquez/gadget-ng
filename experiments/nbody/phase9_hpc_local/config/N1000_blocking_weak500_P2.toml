[simulation]
particle_count = 1000
num_steps = 5
dt = 0.025
seed = 42
box_size = 20.0
softening = 0.5
integrator = "leapfrog"

[initial_conditions]
kind = { plummer = { a = 1.0 } }

[gravity]
solver = "barnes_hut"
theta = 0.5
multipole_order = 3
opening_criterion = "relative"
err_tol_force_acc = 0.005
softened_multipoles = true
mac_softening = "consistent"

[performance]
deterministic = false
use_distributed_tree = true
use_sfc = false
sfc_rebalance_interval = 1
halo_factor = 0.5
force_allgather_fallback = false
let_nonblocking = false

[output]
snapshot_format = "jsonl"
checkpoint_interval = 0
snapshot_interval = 0
