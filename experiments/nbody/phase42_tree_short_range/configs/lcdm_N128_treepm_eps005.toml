# ── ΛCDM N=128³, 2LPT, TreePM + softening ε_phys = 0.05 Mpc/h ──────────────
#
# Variante alta del barrido. ε_internal = 0.05 / 100 = 5.0·10⁻⁴.
# Ver lcdm_N128_treepm_eps001.toml para la descripción completa del pipeline.

[simulation]
particle_count         = 2097152
box_size               = 1.0
dt                     = 0.0004
num_steps              = 200
softening              = 5.0e-4    # ε_phys = 0.05 Mpc/h
gravitational_constant = 1.0
seed                   = 42

[initial_conditions.kind.zeldovich]
seed               = 42
grid_size          = 128
spectral_index     = 0.965
amplitude          = 1.0e-4
transfer           = "eisenstein_hu"
sigma8             = 0.8
omega_b            = 0.049
h                  = 0.674
t_cmb              = 2.7255
box_size_mpc_h     = 100.0
use_2lpt           = true
normalization_mode = "z0_sigma8"

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.02

[gravity]
solver       = "tree_pm"
pm_grid_size = 128
r_split      = 0.0

[output]
snapshot_every    = 50
diagnostics_every = 50
