# ── ΛCDM N=128³, 2LPT, TreePM + softening ε_phys = 0.01 Mpc/h ──────────────
#
# Variante Phase 42 con softening físico *absoluto* en Mpc/h, independiente
# de N. La conversión a unidades internas (box = 1.0, box_mpc_h = 100) da:
#     ε_internal = ε_phys / box_mpc_h = 0.01 / 100 = 1.0·10⁻⁴
#
# `TreePmSolver` (via CLI) aplica:
#     F_lr = erf(r/(√2·r_s)) · PM filtrado
#     F_sr = erfc(r/(√2·r_s)) · octree, kernel Plummer con eps² = ε_internal²
# r_split por defecto = 2.5 · cell_PM = 2.5 / 128 ≈ 0.0195 (internal) ≈ 1.95 Mpc/h.
#
# Nota: el test programático (`phase42_tree_short_range.rs`) llama
# directamente a `short_range_accels_periodic` para corregir el
# minimum-image en SR (el `TreePmSolver` serial usa la variante NO-periódica).

[simulation]
particle_count         = 2097152
box_size               = 1.0
dt                     = 0.0004
num_steps              = 200
softening              = 1.0e-4    # ε_phys = 0.01 Mpc/h
gravitational_constant = 1.0
seed                   = 42

[initial_conditions.kind.zeldovich]
seed               = 42
grid_size          = 128
spectral_index     = 0.965
amplitude          = 1.0e-4
transfer           = "eisenstein_hu"
sigma8             = 0.8
omega_b            = 0.049
h                  = 0.674
t_cmb              = 2.7255
box_size_mpc_h     = 100.0
use_2lpt           = true
normalization_mode = "z0_sigma8"

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.02

[gravity]
solver       = "tree_pm"
pm_grid_size = 128
r_split      = 0.0   # auto: 2.5 · cell_PM

[output]
snapshot_every    = 50
diagnostics_every = 50
