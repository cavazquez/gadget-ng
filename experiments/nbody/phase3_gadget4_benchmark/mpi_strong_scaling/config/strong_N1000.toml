# ── Strong Scaling — N=1000, Plummer ─────────────────────────────────────────
#
# Config para strong scaling: N fijo = 1000, variar número de ranks.
# Barnes-Hut θ=0.5, 50 pasos (suficiente para medir tiempo estable).
#
# Ejecutar con: mpirun -n {1,2,4,8} gadget-ng stepping --config ...

[simulation]
particle_count         = 1000
box_size               = 20.0
dt                     = 0.01
num_steps              = 50
softening              = 0.05
gravitational_constant = 1.0
seed                   = 42

[initial_conditions]
kind = { plummer = { a = 1.0 } }

[gravity]
solver = "barnes_hut"
theta  = 0.5

[output]
snapshot_interval   = 0
checkpoint_interval = 0

[performance]
deterministic = true
