# ── ΛCDM estándar, N=1000, 50 pasos — Fase 17a ───────────────────────────────
#
# Ω_m = 0.3, Ω_Λ = 0.7, H₀ = 0.1 (unidades internas).
# a_init = 1.0 (z=0), retícula perturbada con amplitud del 5%.
#
# Propósito:
#   - Demostrar que el integrador ΛCDM es estable con N mayor.
#   - Comparar evolución de a(t) con EdS para ver efecto de Ω_Λ.
#   - Medir v_rms y delta_rms en diagnostics.jsonl.
#
# NOTA: N=1000 no es cubo perfecto; el IC PerturbedLattice acepta
# cualquier N usando ⌈N^{1/3}⌉³ = 10³ = 1000 (cubo exacto aquí).

[simulation]
particle_count      = 1000      # 10³ retícula exacta
box_size            = 1.0       # Mpc/h (unidades internas normalizadas)
dt                  = 0.005     # paso de tiempo
num_steps           = 50        # t_total = 0.25
softening           = 0.015     # suavizado = 1.5% del box
gravitational_constant = 1.0
seed                = 99999

[initial_conditions]
kind = { perturbed_lattice = { amplitude = 0.05, velocity_amplitude = 0.0 } }

[cosmology]
enabled       = true
omega_m       = 0.3    # Planck 2018 best-fit
omega_lambda  = 0.7
h0            = 0.1    # H₀ en unidades internas
a_init        = 1.0    # z = 0

[gravity]
solver   = "direct"
theta    = 0.5

[output]
# Los diagnósticos se registran en cada paso por defecto.

[performance]
deterministic = true  # comportamiento serial reproducible
