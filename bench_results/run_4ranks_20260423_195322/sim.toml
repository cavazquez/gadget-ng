# ─────────────────────────────────────────────────────────────────────────────
# Phase 79 — Smoke test CI: N = 32³ (versión reducida de validation_128.toml)
#
# Misma configuración física pero N=32³ y 20 pasos para correr en <60 s en CI.
# ─────────────────────────────────────────────────────────────────────────────

[simulation]
particle_count     = 32768             # 32³
box_size           = 200.0             # Mpc/h (misma caja, menor resolución)
dt                 = 0.002
num_steps          = 20
softening          = 0.15
physical_softening = true
seed               = 42

[initial_conditions]
kind = { zeldovich = {
    seed            = 31415,
    grid_size       = 32,
    spectral_index  = 0.9649,
    transfer        = "eisenstein_hu",
    sigma8          = 0.8111,
    omega_b         = 0.0490,
    h               = 0.6736,
    t_cmb           = 2.7255,
    box_size_mpc_h  = 200.0,
    use_2lpt        = true,
    normalization_mode = "z0_sigma8"
} }

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.3153
omega_lambda = 0.6847
h0           = 0.1
a_init       = 0.02
auto_g       = true

[gravity]
solver          = "direct"             # directo para CI rápido
softening       = 0.15
opening_theta   = 0.5
pm_grid         = 32

[timestep]
criterion       = "jerk"
eta             = 0.025
dt_max          = 0.01
dt_min          = 1e-6

[output]
format          = "jsonl"
snapshot_every  = 20
out_dir         = "/tmp/val128_test_out"

[insitu_analysis]
enabled      = false
interval     = 0
