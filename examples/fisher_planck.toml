# Phase 173 — Fisher Matrix Forecasting
#
# Compute the Fisher information matrix for cosmological parameter constraints
# from the matter power spectrum P(k,z).
#
# Usage:
#   gadget-ng fisher --config examples/fisher_planck.toml
#
# Or with explicit parameters:
#   gadget-ng fisher --omega-m 0.315 --sigma8 0.8111 --survey-volume 1e9 --out fisher_output.json

# Fiducial cosmology (Planck 2018 TT,TE,EE+lowE+lensing)
[fisher]
step_frac = 0.01            # 1% step for central finite differences
survey_volume = 1.0e9       # 1 (Gpc/h)³ survey volume
use_nonlinear = true        # Use Halofit for P(k,z)

# The following parameters are passed via CLI flags:
# --omega-m, --omega-b, --h, --n-s, --sigma8, --w0, --wa, --m-nu-ev