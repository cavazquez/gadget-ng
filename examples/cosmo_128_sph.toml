# ─── Producción: 128³ ΛCDM con SPH+insitu completo ──────────────────────────────
#
# Simulación cosmológica de resolución media (128³ = 2M partículas de DM).
# Cosmología Planck 2018, SPH habilitado con cooling simplificado.
# Análisis in-situ: P(k), FoF, SZ, Ly-α, lente débil.
#
# Ejecución:
#   cargo run --release -p gadget-ng-cli -- stepping \
#     --config examples/cosmo_128_sph.toml \
#     --out runs/cosmo128 --snapshot
# ─────────────────────────────────────────────────────────────────────────────

[simulation]
particle_count = 2097152 # 128³ partículas (DM)
box_size       = 64.0  # [Mpc/h comoving]
dt             = 0.0003
num_steps      = 1000
softening      = 0.1    # [Mpc/h]
seed           = 42

[initial_conditions]
kind = "lattice"

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.02
auto_g       = true

[gravity]
solver       = "tree_pm"
pm_grid_size = 128
theta        = 0.5

[output]
snapshot_format     = "jsonl"
checkpoint_interval = 200

[sph]
enabled    = true
gamma      = 1.6666666666666667 # 5/3
n_neigh    = 48
alpha_visc = 1.0
cooling    = "atomic_h_he"
t_floor_k  = 100.0

[sph.feedback]
enabled          = true
stellar_wind_enabled = true

[mhd]
enabled = false

[insitu_analysis]
enabled           = true
interval          = 200
pk_mesh           = 64
fof_b             = 0.2
fof_min_part      = 20
xi_bins           = 10
pk_rsd_bins       = 0
bispectrum_bins   = 0
assembly_bias_enabled = false
igm_temp_enabled  = false
cm21_enabled      = false
sz_enabled        = true
sz_n_pixels       = 128
lya_enabled       = true
lya_n_sightlines  = 64
wl_enabled        = true
wl_n_pixels       = 128
wl_fov_rad        = 0.1
wl_z_edges        = [0.0, 0.5, 1.0, 2.0]
output_dir        = "runs/cosmo128/insitu"