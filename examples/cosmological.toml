# ─── Simulación cosmológica — ΛCDM, z≈49 → z≈0 ───────────────────────────────
#
# 512 partículas de materia oscura en una caja periódica (comoving).
# Cosmología ΛCDM estándar (Planck 2018): Ω_m = 0.3, Ω_Λ = 0.7.
# Caja periódica → solver PM o TreePM (Barnes–Hut no es periódico en este código).
#
# Unidades cosmológicas: `h0` es H₀ en unidades internas de tiempo (~0.1 para
# runs típicos L=Mpc/h, M=10¹⁰ M☉/h, V=km/s); `a_init` inicia el factor de escala.
#
# Ejecución (release para rendimiento):
#   cargo run --release -p gadget-ng-cli -- stepping \
#     --config examples/cosmological.toml \
#     --out runs/cosmo --snapshot
# ─────────────────────────────────────────────────────────────────────────────

[simulation]
particle_count = 512
box_size       = 100.0        # [Mpc/h comoving]
dt             = 0.0005       # paso en tiempo de integración cosmológica
num_steps      = 500
softening      = 0.2          # [Mpc/h]
seed           = 7777

[initial_conditions]
kind = "lattice"

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.3
omega_lambda = 0.7
h0           = 0.1            # H₀ en unidades internas (≈ 67 km/s/Mpc en convención habitual)
a_init       = 0.02           # z inicial ≈ 49
auto_g       = true           # G coherente con Friedmann (ρ̄_m = 1)

[gravity]
solver       = "tree_pm"
pm_grid_size = 32
theta        = 0.5

[output]
snapshot_format     = "jsonl"
checkpoint_interval = 100

# Análisis in-situ: escribe insitu_*.json para postprocess_pk.py (getting-started §6).
[insitu_analysis]
enabled    = true
interval   = 100               # varios instantes P(k) en 500 pasos
pk_mesh    = 32
output_dir = "runs/cosmo/insitu"
