# ─── Producción: 256³ ΛCDM con SPH+MHD+RT+insitu ─────────────────────────────
#
# Simulación cosmológica de alta resolución (256³ = 16M partículas de DM).
# Cosmología Planck 2018, SPH + MHD + RT (reionización).
# Análisis in-situ completo.
#
# REQUISITOS: GPU/CUDA recomendado para el solver PM.
# Tiempo estimado: ~2-4h en 8 CPUs (release build).
#
# Ejecución:
#   cargo run --release -p gadget-ng-cli -- stepping \
#     --config examples/cosmo_256_full.toml \
#     --out runs/cosmo256 --snapshot
# ─────────────────────────────────────────────────────────────────────────────

[simulation]
particle_count = 256   # 256³ = 16,777,216 partículas (DM)
box_size       = 128.0 # [Mpc/h comoving]
dt             = 0.0002
num_steps      = 2000
softening      = 0.05  # [Mpc/h]
seed           = 7777

[initial_conditions]
kind = "lattice"

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.01   # z ≈ 99
auto_g       = true

[gravity]
solver       = "tree_pm"
pm_grid_size = 256
theta        = 0.5

[output]
snapshot_format     = "jsonl"
checkpoint_interval = 500

[sph]
enabled    = true
gamma      = 5.0 / 3.0
n_neigh    = 64
alpha_visc = 1.0

[sph.cooling]
kind        = "simplified"
t_floor_k   = 100.0

[sph.feedback]
enabled             = true
stellar_wind_enabled = true

[mhd]
enabled            = true
cfl_mhd            = 0.3
alpha_b             = 1.0
c_h                 = 1.0
c_r                 = 0.5
dynamo_enabled      = false
reconnection_enabled = false

[rt]
enabled         = true
c_red_factor    = 0.5
kappa_abs       = 0.01
substeps        = 4

[reionization]
enabled    = true
z_start    = 10.0
z_end      = 6.0
n_sources  = 4
uv_luminosity = 1.0

[insitu_analysis]
enabled           = true
interval          = 500
pk_mesh           = 128
fof_b             = 0.2
fof_min_part      = 32
xi_bins           = 20
pk_rsd_bins       = 0
bispectrum_bins   = 0
assembly_bias_enabled = false
igm_temp_enabled  = true
cm21_enabled      = true
sz_enabled        = true
sz_n_pixels       = 256
lya_enabled       = true
lya_n_sightlines  = 256
wl_enabled        = true
wl_n_pixels       = 256
wl_fov_rad        = 0.08
wl_z_edges        = [0.0, 0.5, 1.0, 1.5, 2.0]
output_dir        = "runs/cosmo256/insitu"