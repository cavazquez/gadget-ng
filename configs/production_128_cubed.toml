[simulation]
box_size = 100.0          # Mpc/h
n_particles = 128
final_time = 1.0          # z=0
deterministic = true

[cosmology]
enabled = true
a_init = 0.01             # z=99
omega_m = 0.315
omega_b = 0.049
omega_lambda = 0.685
hubble_h = 0.674
sigma8 = 0.811
n_s = 0.965

[initial_conditions]
kind = { zeldovich = { seed = 12345, grid_size = 128, spectral_index = 0.965, transfer = "eisenstein_hu", sigma8 = 0.811, omega_b = 0.049, h = 0.674, t_cmb = 2.7255, box_size_mpc_h = 100.0, use_2lpt = true, normalization_mode = "z0_sigma8" } }

[gravity]
solver = "tree_pm"
theta = 0.5

[output]
snapshot_interval = 50     # snapshot cada 50 pasos
out_dir = "runs/production_128"

[performance]
use_gpu = false           # CPU-only para reference bit-a-bit
n_threads = 0             # auto
