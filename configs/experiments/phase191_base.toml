# Phase 191 smoke baseline: small periodic cosmological box for runtime overrides.

[simulation]
particle_count = 512
box_size = 25.0
dt = 0.0005
num_steps = 4
softening = 0.05
seed = 191

[initial_conditions]
kind = "lattice"

[cosmology]
enabled = true
periodic = true
omega_m = 0.315
omega_lambda = 0.685
h0 = 0.1
a_init = 0.05
auto_g = true

[gravity]
solver = "tree_pm"
pm_grid_size = 16
theta = 0.5

[output]
snapshot_format = "jsonl"
checkpoint_interval = 0

[sph]
enabled = false
gas_fraction = 0.0

[insitu_analysis]
enabled = false
