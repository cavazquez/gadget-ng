# ─────────────────────────────────────────────────────────────────────────────
# Corrida de TEST para G3 — N = 32³ (CI / smoke test)
#
# Misma configuración física que production_256.toml pero con N reducido para
# que corra en CI (<60 s). Se usa en phase_g3_production.rs.
# ─────────────────────────────────────────────────────────────────────────────

[simulation]
particle_count     = 32768         # 32³ (reducido para CI)
box_size           = 50.0          # Mpc/h
dt                 = 0.005
num_steps          = 10
softening          = 0.2           # Mpc/h
physical_softening = true
seed               = 42

[initial_conditions]
kind = { zeldovich = {
    seed            = 12345,
    grid_size       = 32,
    spectral_index  = 0.965,
    transfer        = "eisenstein_hu",
    sigma8          = 0.811,
    omega_b         = 0.049,
    h               = 0.674,
    t_cmb           = 2.7255,
    box_size_mpc_h  = 50.0,
    use_2lpt        = true,
    normalization_mode = "z0_sigma8"
} }

[cosmology]
enabled      = true
periodic     = true
omega_m      = 0.315
omega_lambda = 0.685
h0           = 0.1
a_init       = 0.02
auto_g       = true

[units]
enabled          = true
length_in_kpc    = 1000.0
mass_in_msun     = 1.0e10
velocity_in_km_s = 1.0

[gravity]
solver          = "tree_pm"
theta           = 0.5
pm_grid_size    = 64
treepm_sr_sfc   = true
treepm_halo_3d  = true
treepm_pm_scatter_gather = true

[performance]
deterministic  = true
use_sfc        = true
use_distributed_tree = true

[timestep]
hierarchical = true
eta          = 0.025
max_level    = 4

[output]
snapshot_format     = "jsonl"
checkpoint_interval = 0
snapshot_interval   = 5
